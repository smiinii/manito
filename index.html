<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>태초마을 MT: 보안 마니또</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background-color: #0f172a; color: #f8fafc; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        .mission-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes pulse-indigo { 0%, 100% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.8); } }
        .neon-glow { animation: pulse-indigo 2s infinite; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .confidential { filter: blur(10px); transition: filter 0.3s; user-select: none; }
        .confidential:active { filter: blur(0); }
        .my-card { border: 2px solid #fbbf24 !important; background: rgba(251, 191, 36, 0.15) !important; box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        input, button, select { font-size: 16px !important; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="text-center mb-8 mt-4">
            <h1 class="title-font text-4xl md:text-5xl text-indigo-400 mb-2 tracking-tighter">MANITTO <span class="text-pink-500">SECURE</span></h1>
            <p class="text-indigo-200 opacity-80 italic text-sm">"방마다 바뀌는 랜덤 마스터키 시스템"</p>
            <div id="connection-status" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-red-500/20 text-red-400 text-[10px] mt-2 font-mono">
                <div class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></div> DB CONNECTING...
            </div>
        </div>

        <!-- Step 0: Entrance -->
        <div id="view-entrance" class="space-y-4">
            <div class="mission-card rounded-3xl p-6 md:p-8 shadow-2xl text-center border border-indigo-500/20">
                <button onclick="showCreateRoom()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl text-xl font-bold mb-6 shadow-lg active:scale-95">새로운 방 만들기</button>
                <div class="flex items-center gap-2 mb-6"><div class="flex-1 h-[1px] bg-slate-700"></div><span class="text-slate-500 text-xs font-bold uppercase font-mono">JOIN ROOM</span><div class="flex-1 h-[1px] bg-slate-700"></div></div>
                <div class="space-y-4 text-left">
                    <input type="number" id="join-code" placeholder="방 코드 4자리" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-bold tracking-[0.2em] focus:outline-none focus:border-indigo-500 transition-colors">
                    <input type="text" id="join-nickname" placeholder="이름 입력" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-center text-lg focus:outline-none focus:border-indigo-500 transition-colors">
                    <input type="password" id="join-pw" placeholder="비밀번호" inputmode="numeric" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-center text-lg focus:outline-none focus:border-indigo-500 transition-colors">
                    <button onclick="joinRoom()" class="w-full bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-bold transition-all text-indigo-300 mt-2 shadow-inner active:scale-95">인증 후 입장</button>
                </div>
            </div>
        </div>

        <!-- Step 1: Setup -->
        <div id="view-setup" class="hidden space-y-4">
            <div class="mission-card rounded-3xl p-6 shadow-2xl border-2 border-indigo-500/50 text-center">
                <div class="mb-6 p-5 bg-indigo-900/40 rounded-2xl">
                    <p class="text-indigo-300 text-[10px] mb-1 font-bold uppercase tracking-widest">방 코드</p>
                    <h2 id="room-display-large" class="text-5xl title-font text-white tracking-widest font-mono">----</h2>
                </div>
                <div class="flex gap-2 mb-4 text-left">
                    <input type="text" id="name-input" placeholder="동기 이름 입력" class="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                    <button onclick="addName()" class="bg-indigo-600 hover:bg-indigo-500 px-5 py-3 rounded-xl font-bold active:scale-95">추가</button>
                </div>
                <div id="name-tags" class="flex flex-wrap gap-2 mb-8 min-h-[50px] p-2 rounded-xl bg-slate-900/30 border border-slate-800"></div>
                <button id="match-btn" onclick="startMatching()" class="w-full bg-gradient-to-r from-indigo-600 to-pink-600 py-4 rounded-2xl text-xl font-bold shadow-lg transform active:scale-95 hidden">매칭 시작 및 비번 생성</button>
            </div>
        </div>

        <!-- Step 2: Result View -->
        <div id="view-result" class="hidden space-y-4 pb-12">
            <div class="flex justify-between items-center mb-2 px-1">
                <h2 class="text-sm font-bold text-indigo-400" id="result-room-code">ROOM: ----</h2>
                <button onclick="location.reload()" class="text-slate-500 text-[10px] font-bold underline">초기화/나가기</button>
            </div>

            <!-- 관리자 대시보드 -->
            <div id="admin-panel" class="hidden mission-card rounded-3xl p-5 border-2 border-pink-500/50 mb-6 shadow-[0_0_20px_rgba(236,72,153,0.2)]">
                <h3 class="text-pink-400 text-center font-bold mb-4 flex items-center justify-center gap-2">
                    <i class="fas fa-user-shield"></i> 관리자 대시보드
                </h3>
                <p class="text-[11px] text-slate-400 mb-3 text-center">비밀번호를 각 동기에게 개별적으로 알려주세요!</p>
                <div id="pw-list" class="grid grid-cols-2 gap-2 text-xs"></div>
            </div>

            <div class="bg-indigo-900/40 p-5 rounded-3xl border border-indigo-500/30 mb-6 text-center shadow-xl">
                <p class="text-white text-lg mb-1 font-bold"><span id="user-display" class="text-yellow-400"></span>님, 환영합니다!</p>
                <p class="text-indigo-300 text-[10px] opacity-70">이름을 눌러 미션을 확인하세요.</p>
            </div>
            <div id="check-grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- 마스터 키 안내 모달 -->
        <div id="master-key-modal" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center p-6 text-center">
            <div class="mission-card rounded-[2.5rem] p-8 border-2 border-yellow-500 max-w-sm w-full shadow-[0_0_50px_rgba(234,179,8,0.3)]">
                <i class="fas fa-key text-yellow-500 text-4xl mb-4 animate-bounce"></i>
                <h2 class="text-2xl font-bold text-white mb-2">방장 마스터 키 발급</h2>
                <p class="text-slate-400 text-sm mb-6 leading-relaxed">이 번호는 성민님(방장) 전용입니다.<br><span class="text-pink-500 font-bold">지금 바로 캡처하거나 메모하세요!</span></p>
                <div id="host-pw-display" class="text-6xl title-font text-yellow-400 tracking-widest mb-8 bg-slate-800/80 py-6 rounded-3xl border border-yellow-500/30 shadow-inner">0000</div>
                <button onclick="closeMasterKey()" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-2xl font-bold text-white shadow-lg active:scale-95 transition-all">확인했습니다</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="fixed inset-0 bg-slate-950/90 flex items-center justify-center z-[100] transition-opacity duration-300">
            <div class="bg-slate-900 p-8 rounded-[2rem] flex flex-col items-center gap-4 border border-slate-800 shadow-2xl">
                <div class="loader"></div><p class="text-indigo-300 font-bold animate-pulse text-sm" id="loading-text">보안 연결 수립 중...</p>
            </div>
        </div>
    </div>

    <!-- 미션 확인 모달 -->
    <div id="modal" class="fixed inset-0 bg-slate-950/98 z-[70] hidden flex items-center justify-center p-6">
        <div class="mission-card w-full max-w-sm rounded-[2.5rem] p-8 border-2 border-indigo-500 text-center relative shadow-[0_0_60px_rgba(99,102,241,0.25)]">
            <p id="modal-owner" class="text-indigo-400 text-lg mb-2 underline decoration-indigo-500 decoration-2 font-bold"></p>
            <p class="text-slate-400 text-xs mb-6 uppercase tracking-widest">당신의 마니또 타겟</p>
            <div id="modal-target" class="text-5xl title-font text-white mb-8 tracking-widest confidential">---</div>
            <div class="bg-slate-800/80 rounded-2xl p-6 border border-slate-700 shadow-inner">
                <p class="text-pink-500 text-xs font-bold mb-3 uppercase tracking-[0.2em] flex items-center justify-center gap-2"><i class="fas fa-mask"></i> Secret Mission</p>
                <p id="modal-mission" class="text-lg leading-relaxed text-slate-200 confidential font-medium"></p>
            </div>
            <p class="text-[10px] text-yellow-500/80 mt-6 font-bold animate-bounce uppercase">화면을 꾹 누르면 내용이 보입니다</p>
            <button onclick="closeModal()" class="mt-8 w-full bg-slate-700 py-4 rounded-2xl font-bold border border-slate-600 active:scale-95 text-sm">닫기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCs9xNx5rljT_KSQqZdt4KEzzwGEpazdVE",
            authDomain: "taecho-manitto.firebaseapp.com",
            projectId: "taecho-manitto",
            storageBucket: "taecho-manitto.firebasestorage.app",
            messagingSenderId: "873301716753",
            appId: "1:873301716753:web:28041c32abbf8bec17e6b0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "taecho-manitto-final-secure-v2";

        let names = [];
        let roomData = null;
        let currentRoomId = null;
        let myNickname = null;
        let isAdmin = false;
        let unsubscribeRoom = null;

        const missions = [
            "타겟이 술이나 음료 마실 때마다 옆에서 '캬~' 소리 크게 내주기",
            "타겟의 신발 한 짝 몰래 숨겼다가 20분 뒤에 찾아주기",
            "타겟에게 오늘 찍은 사진 중 인생샷 하나 정성스럽게 찍어주기",
            "타겟이 하는 모든 말에 5분 동안 '대박', '진짜?'라며 리액션하기",
            "타겟의 물잔이 비지 않게 아무도 모르게 3번 이상 가득 채워주기",
            "타겟 주위를 아무 말 없이 무표정으로 한 바퀴 크게 돌고 떠나기",
            "타겟에게 갑자기 가서 '오늘 향기 되게 좋으시네요'라고 진지하게 말하기",
            "타겟이 웃을 때마다 옆에서 무지성으로 박수 3번씩 크게 쳐주기",
            "타겟에게 편의점 간식(젤리, 껌 등)을 두 손으로 정중하게 주기",
            "타겟 옆에 앉아서 갑자기 '저기... 혹시 MBTI가 C.U.T.E인가요?'라고 묻기",
            "타겟이 자리를 비우면 그 의자를 냅킨으로 정성껏 닦아두기",
            "타겟에게 손가락 하트 날린 후, 반응하면 '아, 잘못 날렸네'라고 정색하기",
            "타겟의 어깨를 갑자기 5초 동안 아주 시원하게 안마해주기",
            "타겟이 먹고 있는 안주 중 하나를 세상에서 제일 얄밉게 뺏어 먹기",
            "타겟의 이름 뒤에 무조건 '대장님' 혹은 '주인님' 붙여서 부르기",
            "타겟에게 가서 뜬금없이 '사실... 아까부터 계속 멋지다고 생각했어요'라고 하기",
            "타겟이 덥거나 추워 보이면 부채질해주거나 겉옷 챙겨주는 척하기",
            "타겟과 눈이 마주치면 3초 동안 윙크 발사하고 시선 피하기",
            "타겟의 컵이나 수저를 아무도 모르게 냅킨으로 깨끗이 닦아놓기",
            "타겟이 말할 때마다 두 손으로 입을 가리고 '어머나!'라며 감탄하기",
            "타겟에게 슬그머니 가서 '오늘 스타일이 완전 연예인 같으시네요'라고 칭찬하기",
            "타겟 주변을 3바퀴 빙글빙글 돌고 아무 일 없었다는 듯이 떠나기",
            "타겟이 화장실 갈 때 문 앞에서 '화이팅! 기다릴게요!'라고 말하기",
            "타겟이 웃긴 얘기를 하면 무조건 세상에서 제일 크게 웃어주기",
            "타겟에게 맛있는 쌈을 하나 싸서 입에 직접 넣어주기",
            "타겟 몰래 등에 '저는 마니또가 있습니다' 포스트잇 붙이고 3분 버티기",
            "타겟이 뭐 할 때마다 옆에서 '오~ 대박~' 하면서 추임새 넣기",
            "타겟에게 갑자기 가위바위보 신청해서 3번 연속으로 져주기",
            "타겟의 이름으로 삼행시 지어서 귓속말로 속삭여주기",
            "타겟에게 '오늘 눈빛이 참 치명적이시네요'라고 진지하게 말하기"
        ];

        async function initAuth() { try { await signInAnonymously(auth); } catch (e) {} }
        onAuthStateChanged(auth, (user) => {
            const status = document.getElementById('connection-status');
            if (user) {
                status.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-green-500"></div> DB CONNECTED`;
                status.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-green-500/20 text-green-400 text-[10px] mt-2 font-mono";
                toggleLoading(false);
            }
        });
        initAuth();

        window.showCreateRoom = () => {
            currentRoomId = Math.floor(1000 + Math.random() * 9000).toString();
            names = []; // 초기화
            document.getElementById('view-entrance').classList.add('hidden');
            document.getElementById('view-setup').classList.remove('hidden');
            document.getElementById('room-display-large').innerText = currentRoomId;
            renderNames();
        };

        window.addName = () => {
            const input = document.getElementById('name-input');
            const val = input.value.trim();
            if (val && !names.includes(val)) { names.push(val); input.value = ''; renderNames(); }
        };

        window.removeName = (n) => { names = names.filter(x => x !== n); renderNames(); };

        function renderNames() {
            const container = document.getElementById('name-tags');
            document.getElementById('count').innerText = names.length;
            container.innerHTML = names.map(n => `<div class="bg-indigo-900/50 border border-indigo-400/50 text-indigo-100 px-3 py-1.5 rounded-xl flex items-center gap-2"><span>${n}</span><button onclick="window.removeName('${n}')" class="text-pink-500 font-bold p-1">×</button></div>`).join('');
            document.getElementById('match-btn').classList.toggle('hidden', names.length < 3);
        }

        window.startMatching = async () => {
            if (!auth.currentUser) return;
            toggleLoading(true, "운명을 결정하는 중...");

            let shuffledNames = [...names];
            while (true) {
                for (let i = shuffledNames.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledNames[i], shuffledNames[j]] = [shuffledNames[j], shuffledNames[i]];
                }
                if (shuffledNames.every((n, i) => n !== names[i])) break;
            }

            let shuffledMissions = [...missions];
            for (let i = shuffledMissions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledMissions[i], shuffledMissions[j]] = [shuffledMissions[j], shuffledMissions[i]];
            }

            // 🔑 방장 마스터키 무작위 생성
            const masterPw = Math.floor(1000 + Math.random() * 9000).toString();

            const assignments = names.map((name, i) => ({
                manitto: name,
                target: shuffledNames[i],
                mission: shuffledMissions[i],
                password: Math.floor(1000 + Math.random() * 9000).toString(),
                checked: false
            }));

            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                await setDoc(roomRef, { assignments, masterPw, createdAt: new Date().toISOString() });
                
                document.getElementById('host-pw-display').innerText = masterPw;
                document.getElementById('master-key-modal').classList.remove('hidden');
                toggleLoading(false);
            } catch (e) { alert("방 생성 실패!"); toggleLoading(false); }
        };

        window.closeMasterKey = () => location.reload();

        window.joinRoom = async () => {
            const code = document.getElementById('join-code').value;
            const nick = document.getElementById('join-nickname').value.trim();
            const pw = document.getElementById('join-pw').value.trim();
            if (!code || !nick || !pw) return alert("정보를 모두 입력하세요.");
            toggleLoading(true, "인증 확인 중...");
            try {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code));
                if (snap.exists()) {
                    const data = snap.data();
                    if (pw === data.masterPw) {
                        isAdmin = true;
                        myNickname = nick;
                        currentRoomId = code;
                        roomData = data;
                        renderResultView();
                        return;
                    }
                    const user = data.assignments.find(a => a.manitto === nick && a.password === pw);
                    if (user) {
                        isAdmin = false;
                        myNickname = nick;
                        currentRoomId = code;
                        roomData = data;
                        renderResultView();
                    } else { alert("비밀번호가 틀렸습니다!"); toggleLoading(false); }
                } else { alert("방을 찾을 수 없습니다."); toggleLoading(false); }
            } catch (e) { alert("에러 발생!"); toggleLoading(false); }
        };

        function renderResultView() {
            document.getElementById('view-entrance').classList.add('hidden');
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-result').classList.remove('hidden');
            document.getElementById('result-room-code').innerText = `ROOM CODE: ${currentRoomId}`;
            document.getElementById('user-display').innerText = myNickname;

            if (isAdmin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('pw-list').innerHTML = roomData.assignments.map(a => `<div class="bg-slate-800 p-2 rounded border border-slate-700 flex justify-between"><span>${a.manitto}</span><span class="text-pink-400 font-bold font-mono">${a.password}</span></div>`).join('');
            }
            document.getElementById('check-grid').innerHTML = roomData.assignments.map((d, i) => {
                const isMe = d.manitto === myNickname;
                return `<button onclick="window.handleCardClick(${i})" class="p-5 rounded-[1.5rem] border-2 flex flex-col items-center gap-1 active:scale-95 ${isMe ? (d.checked ? 'border-yellow-500 bg-yellow-900/30' : 'my-card text-yellow-50 neon-glow') : (d.checked ? 'border-slate-800 opacity-60' : 'border-indigo-500/10 bg-slate-800/40 text-slate-500') }">
                <span class="text-[8px] opacity-60 font-bold uppercase">${d.checked ? 'Checked' : (isMe ? 'Mine' : 'Hidden')}</span><span class="text-lg">${d.manitto}</span></button>`;
            }).join('');
            toggleLoading(false);
        }

        window.handleCardClick = async (idx) => {
            if (isAdmin) return alert("관리자는 비번 확인만 가능합니다!");
            const item = roomData.assignments[idx];
            if (item.manitto !== myNickname) return alert("본인 것만 열 수 있습니다!");
            document.getElementById('modal-owner').innerText = `${item.manitto}님!`;
            document.getElementById('modal-target').innerText = item.target;
            document.getElementById('modal-mission').innerText = item.mission;
            document.getElementById('modal').classList.remove('hidden');
            if (!item.checked) {
                const newAssignments = [...roomData.assignments];
                newAssignments[idx].checked = true;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId), { assignments: newAssignments }, { merge: true });
            }
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        function toggleLoading(s, t = "연결 중...") { const l = document.getElementById('loading'); document.getElementById('loading-text').innerText = t; l.style.opacity = s ? "1" : "0"; setTimeout(() => { l.classList.toggle('hidden', !s); }, s ? 0 : 300); }
    </script>
</body>
</html>
